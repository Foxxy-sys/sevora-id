<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>404 — Page Not Found | Sevora</title>

    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#2C2622" />

    <link rel="icon" type="image/png" href="images/logo/logo-sevora.png" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/favicon/apple-touch-icon.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />

    <style>
      .error-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px;
        background: #f8f4ef;
        position: relative;
        overflow: hidden;
      }

      .error-page::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at top, #c8a46a10, transparent 45%);
      }

      .error-content {
        position: relative;
        z-index: 2;
        max-width: 600px;
      }

      .error-code {
        font-size: 170px;
        font-family: var(--font-heading);
        color: #b89258;
        line-height: 1;
      }

      .error-page h1 {
        font-size: 38px;
        margin: 20px 0;
      }

      .error-page p {
        max-width: 500px;
        margin: auto;
        color: #666;
        line-height: 1.8;
        margin-bottom: 35px;
      }

      .error-actions {
        display: flex;
        justify-content: center;
        gap: 18px;
        flex-wrap: wrap;
      }

      @media (max-width: 768px) {
        .error-code {
          font-size: 110px;
        }

        .error-page h1 {
          font-size: 30px;
        }
      }
    </style>
  </head>
  <body>
    <section class="error-page">
      <div class="error-content">
        <div class="error-code">404</div>

        <h1>Your table couldn't be found.</h1>

        <p>
          The page you're looking for may have been moved, renamed, or is no
          longer available. Let's guide you back to an exceptional dining
          experience.
        </p>

        <div class="error-actions">
          <a href="index.html" class="btn btn-primary"> Back to Home </a>

          <a href="index.html#reservation" class="btn btn-outline">
            Reserve a Table
          </a>
        </div>
      </div>
    </section>
  </body>
</html>
